name: Build and publish container image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with branch name
            type=ref,event=branch
            # Tag releases with 'latest'
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Tag with semantic version
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            # Tag with short SHA
            type=sha,prefix=

      - name: Build container image
        env:
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          mkdir -p ~/.m2/repository ~/.m2/wrapper

          declare -a BUILD_OPTS=( \
            --file ./Containerfile \
            --pull=newer \
            --omit-history \
            --volume ~/.m2/repository:/root/.m2/repository:z \
            --volume ~/.m2/wrapper:/root/.m2/wrapper:z \
            --tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build" \
          )
          while IFS= read -r label; do
            [ -n "$label" ] && BUILD_OPTS+=( --label "$label" )
          done <<< "$LABELS"

          podman build "${BUILD_OPTS[@]}" .

      - name: Tag and push container image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            podman tag "${IMAGE}:build" "${tag}"
            podman push "${tag}"
          done <<< "$TAGS"
